<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Piso</title>
<style>
  :root { --g: #17A36B; --bg: #F0F1EC; --t1: #1A1A1A; }
  body { background: var(--bg); font-family: sans-serif; padding: 10px; color: var(--t1); }
  .card { background: #fff; border-radius: 12px; padding: 15px; margin-bottom: 10px; border: 1px solid #ddd; }
  .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 5px; }
  .btn-g { background: var(--g); color: #fff; }
  .btn-w { background: #E8950A; color: #fff; }
  .btn-r { background: #D94040; color: #fff; }
  .task { display: flex; align-items: center; gap: 10px; padding: 10px; border-bottom: 1px solid #eee; font-size: 14px; }
  .done { background: #e0f5ec; text-decoration: line-through; }
  .hidden { display: none; }
</style>
</head>
<body>
  <div class="card">
    <h2>OT: <input type="text" id="inpOT" placeholder="Orden de Trabajo"></h2>
    <p>Operario: <input type="text" id="inpOp" placeholder="Nombre"></p>
  </div>
  <div class="card" style="text-align:center">
    <h1 id="timerDisplay">00:00:00</h1>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 5px;">
      <button class="btn btn-g" id="btnStart" onclick="startTimer()">INICIAR</button>
      <button class="btn btn-w" id="btnPause" onclick="togglePause()" disabled>PAUSA</button>
    </div>
    <button class="btn btn-r" id="btnFinish" onclick="finishTask()" disabled>FINALIZAR</button>
  </div>
  <div class="card">
    <h3>Checklist</h3>
    <div id="taskList"></div>
  </div>
<script>
var URL_GS = "https://script.google.com/macros/s/AKfycby9gieKbqVFTLg3q1a2yzkAs3DxVahWI-U2RQQRBL76P8LanMTxL2WAiWzQ4DmmCZtqiQ/exec";
var TAREAS = ["Inspección Visual", "Focalx check-in", "Vaciado de tanques", "Revisión Faltantes", "Revision Freno", "Caja de Cambios", "Revisión dirección", "Potencia Motor", "Tapacantos", "Puertas", "Cortinas", "Mesacama", "Tapizados", "Aceite/Cubiertas", "Líquidos/Gas", "Luces Ext", "Bomba/Calefón", "Caldera/Anafe", "Desagues", "Aire/Climatizador", "Batería", "Heladera/TV", "Luces Int", "Aspirado", "Limpieza cabina", "Baño", "Living", "Limpieza ext", "Seguridad", "Neumáticos", "Tupper", "Ropa blanca", "Aguas blancas"];
var st = { phase: 'idle', startMs: null, pauseStart: null, pauseAccum: 0, checks: Array(TAREAS.length).fill(false) };

function startTimer() {
  if(!document.getElementById('inpOT').value || !document.getElementById('inpOp').value) return alert('Faltan datos');
  st.phase = 'running'; st.startMs = Date.now();
  document.getElementById('btnStart').disabled = true;
  document.getElementById('btnPause').disabled = false;
  document.getElementById('btnFinish').disabled = false;
  setInterval(tick, 1000);
}

function tick() {
  if (st.phase !== 'running') return;
  var diff = Date.now() - st.startMs - st.pauseAccum;
  var s = Math.floor(diff / 1000);
  document.getElementById('timerDisplay').textContent = new Date(s * 1000).toISOString().substr(11, 8);
}

function togglePause() {
  if (st.phase === 'running') { st.pauseStart = Date.now(); st.phase = 'paused'; }
  else { st.pauseAccum += Date.now() - st.pauseStart; st.phase = 'running'; }
}

function finishTask() {
  st.phase = 'done';
  var data = { ot: document.getElementById('inpOT').value, operario: document.getElementById('inpOp').value, tiempo: document.getElementById('timerDisplay').textContent };
  fetch(URL_GS, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
  alert('Enviado con éxito');
}

var listHtml = '';
TAREAS.forEach((t, i) => {
  listHtml += `<div class="task" onclick="this.classList.toggle('done')"><input type="checkbox"> ${t}</div>`;
});
document.getElementById('taskList').innerHTML = listHtml;
</script>
</body>
</html>
